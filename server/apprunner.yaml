# AWS App Runner source-based config.
# When creating the service, set "Source directory" to `server/` (this file's dir).
# Secrets (OPENAI_API_KEY) are NOT here — set them in the App Runner console as
# environment variables or Secrets Manager refs. Never commit the API key.
version: 1.0
runtime: python3
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.11
  command: uvicorn app.main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: AWS_REGION
      value: ap-northeast-2
    - name: POKEMON_SPECIES_SOURCE
      value: dynamodb
    - name: POKEMON_SPECIES_TABLE_NAME
      value: pokemon-species
    - name: POKEMON_OPTIONS_TABLE_NAME
      value: pokemon-battle-options
    - name: AI_QUESTION_GENERATION_ENABLED
      value: "true"
    - name: AI_QUESTION_RENDERING_ENABLED
      value: "true"
    - name: OPENAI_CANDIDATE_MODEL
      value: gpt-5.4-mini
    - name: OPENAI_RENDER_MODEL
      value: gpt-5.4-mini
    # User/quiz data default to in-memory. To persist across restarts, create the
    # tables (user-pokemon-data, user-quiz-history) then flip these to dynamodb:
    # - name: USER_POKEMON_DATA_SOURCE
    #   value: dynamodb
    # - name: QUIZ_HISTORY_SOURCE
    #   value: dynamodb
    # OPENAI_API_KEY: set in the App Runner console (env var / Secrets Manager).
